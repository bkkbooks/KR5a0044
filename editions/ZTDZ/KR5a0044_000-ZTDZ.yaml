body:
  text: 太上洞眞五星秘授經爾時元始天尊於大羅天上白玉京中黄金闕内承華殿上與天仙地仙水仙等說三元兩曜五星及羅睺計都二十八宿等眞君之號而言曰吾觀見四海之内九地之人上至帝王候伯下及飛走萬類山河分野臨照之虔禍福應見不能詳辯況大地人民多造罪惡希成善因致九州靈官三元上奏罪業深重減禄促壽速歸下泉變種種形狀永居畜類今我演此眞經令九地之人依法遵敬獲種種福俱得延齡而宣言曰東方木德眞君主發生萬物變𢡖爲舒如世人運炁逢遇多有福慶宜弘善以迎之其眞君戴星冠躡朱履衣青霞壽鶴之衣手執玉簡懸七星金劔垂白玉環珮宜圖形供養以異花珍果浄水名香燈燭清醴䖍心瞻敬至心而呪曰木星眞君動必懷仁憫見志願壽我千春西方金德眞君主揫斂萬物告成功肅如世人運炁逢遇多有災恠刑獄之咎宜弘善以迎之其眞君戴星冠躡朱履衣皓鶴白霞之衣手執玉簡懸七星金劔垂白玉環珮宜圖形供養以異花珍果淨水名香燈燭清醴䖍心瞻敬至心而呪曰金星眞君禍无常準蠢動成形俱希含忍南方火德眞君主長養萬物燭幽洞微如世人運炁逢遇多有災厄疾病之尢宜弘善以迎之其眞君戴星冠躡朱履衣朱霞壽鶴之衣手執玉簡懸七星金劔垂白玉環珮宜圖形供養以異花珍果淨水名香燈燭清醴虔心瞻敬至心而呪曰火星眞君主張諸惡去邪護眞愼勿交錯北方水德眞君通利萬物含眞娠靈如世人運炁逢遇多有災滯劾掠之苦宜弘善以迎之其眞君戴星冠躡朱履衣玄霞壽鶴之衣手執玉簡懸七星金劔垂白玉環珮宜圖形供養以異花珍果淨水名香燈燭清醴䖍心瞻敬至心而呪曰水星眞君含育萬類禍福不差其功罔匱中央土德眞君主四時廣育萬類成功不愆如世人運炁逢遇多有憂塞刑律之厄宜弘善以迎之其眞君戴星冠躡朱履衣黄霞壽鶴之衣手執玉簡懸七星金劔垂白玉環珮宜圖形供養以異香珍果淨水名香燈燭清醴䖍心瞻敬至心而呪曰土星眞君隂弘至德福我蒼生長躋壽域太陽眞君主照臨六合舒和萬彚如世人運炁逢遇多有喜慶宜弘善以迎之其眞君戴星冠躡朱履衣絳紗之衣手執玉簡懸七星金劔垂白玉環珮宜圖形供養以異花珍果淨水名香燈燭清醴䖍心瞻敬至心而呪曰太陽眞君杲杲髙邁萬類仰之群動是頼太隂眞君主肅靜八荒明明輝盛如世人運炁逢遇多有慘慘之憂宜弘善以迎之其眞君戴星冠躡朱履衣素紗之衣手執玉簡懸七星金劔垂白玉環珮宜圖形供養以異花珍果淨水名香燈燭清醴䖍心瞻敬至心而呪曰太隂眞君常弘正道隂德不愆福我億兆羅睺眞君主九天之下一切諸惡如世人運炁逢遇多有災厄深重宜弘善以迎之其眞君戴星冠躡朱履衣純玄之衣手執玉簡懸七星金劔垂白玉環珮宜圖形供養以異花珍果淨水名香燈燭清醴䖍心瞻敬至心而呪曰羅睺眞君㝠㝠可畏好道含弘可期千歳計都眞君主九地之上一切罪惡如世人運炁逢遇多有厄難困苦之災宜弘善以迎之其眞君戴星冠躡朱履衣純玄之衣手執玉簡懸七星金劔垂白玉環珮宜圖形供養以異花珍果淨水名香燈燭清醴虔心瞻敬至心而呪曰計都眞君黙黙察察九天之下護命惡殺二十八宿眞君主世人榮樂壽苦之數其眞君俱戴星冠躡朱履衣絳紗之衣手執青玉簡佩七星寳劔垂金璫珠珮各宜圖形供養以異花珍果淨水名香燈燭清醴䖍心瞻敬至心而呪曰群星飛光環拱辰極普天兆民常蒙至德天尊言九地世人若遇災星臨照之處但依受此法无不獲諸福慶若三元設醮建立壇塲誦諸神呪廣積吉善爲民祈福三官上奏即命眞籙延算俱得長生天尊勑諸大仙及九府靈官三元上奏三官隨其善惡速須上奏我令一切成形永不墜諸惡類獲種種福是時應諸大仙稽首上奏願承慈皆永當奉行太上洞眞五星秘授經

body:
  text: 太上洞真五星祕授經爾時元始天尊於大羅天上白玉京中黃金闕內承華殿上與天仙地仙水仙等説三元兩曜五星及羅睺計都二十八宿等真君之號而言曰吾觀見四海之內九地之人上至帝王候伯下及飛走萬類山河分野臨照之虔禍福應見不能詳辨況大地人民多造罪惡希成善因致九州靈官三元上奏罪業深重減祿促壽速歸下泉變種種形狀永居畜類今我演此真經令九地之人依法遵敬獲種種福俱得延齡而宣言曰東方木德真君主發生萬物變慘為舒如世人運氣逢遇多有福慶宜弘善以迎之其真君戴星冠躡朱履衣青霞壽鶴之衣手執玉簡懸七星金劔垂白玉環珮宜圖形供養以異花珍果淨水名香燈燭清醴虔心瞻敬至心而呪曰木星真君動必懷仁憫見志願壽我千春西方金德真君主揫斂萬物告成功肅如世人運氣逢遇多有災怪刑獄之咎宜弘善以迎之其真君戴星冠躡朱履衣皓鶴白霞之衣手執玉簡懸七星金劔垂白玉環珮宜圖形供養以異花珍果淨水名香燈燭清醴虔心瞻敬至心而呪曰金星真君禍無常準蠢動成形俱希含忍南方火德真君主長養萬物燭幽洞微如世人運氣逢遇多有災厄疾病之尢宜弘善以迎之其真君戴星冠躡朱履衣朱霞壽鶴之衣手執玉簡懸七星金劔垂白玉環珮宜圖形供養以異花珍果淨水名香燈燭清醴虔心瞻敬至心而呪曰火星真君主張諸惡去邪護真愼勿交錯北方水德真君通利萬物含真娠靈如世人運氣逢遇多有災滯劾掠之苦宜弘善以迎之其真君戴星冠躡朱履衣玄霞壽鶴之衣手執玉簡懸七星金劔垂白玉環珮宜圖形供養以異花珍果淨水名香燈燭清醴虔心瞻敬至心而呪曰水星真君含育萬類禍福不差其功罔匱中央土德真君主四時廣育萬類成功不愆如世人運氣逢遇多有憂塞刑律之厄宜弘善以迎之其真君戴星冠躡朱履衣黃霞壽鶴之衣手執玉簡懸七星金劔垂白玉環珮宜圖形供養以異香珍果淨水名香燈燭清醴虔心瞻敬至心而呪曰土星真君隂弘至德福我蒼生長躋壽域太陽真君主照臨六合舒和萬彚如世人運氣逢遇多有喜慶宜弘善以迎之其真君戴星冠躡朱履衣絳紗之衣手執玉簡懸七星金劔垂白玉環珮宜圖形供養以異花珍果淨水名香燈燭清醴虔心瞻敬至心而呪曰太陽真君杲杲髙邁萬類仰之群動是賴太隂真君主肅靜八荒明明輝盛如世人運氣逢遇多有慘慘之憂宜弘善以迎之其真君戴星冠躡朱履衣素紗之衣手執玉簡懸七星金劔垂白玉環珮宜圖形供養以異花珍果淨水名香燈燭清醴虔心瞻敬至心而呪曰太隂真君常弘正道隂德不愆福我億兆羅睺真君主九天之下一切諸惡如世人運氣逢遇多有災厄深重宜弘善以迎之其真君戴星冠躡朱履衣純玄之衣手執玉簡懸七星金劔垂白玉環珮宜圖形供養以異花珍果淨水名香燈燭清醴虔心瞻敬至心而呪曰羅睺真君冥冥可畏好道含弘可期千歲計都真君主九地之上一切罪惡如世人運氣逢遇多有厄難困苦之災宜弘善以迎之其真君戴星冠躡朱履衣純玄之衣手執玉簡懸七星金劔垂白玉環珮宜圖形供養以異花珍果淨水名香燈燭清醴虔心瞻敬至心而呪曰計都真君默默察察九天之下護命惡殺二十八宿真君主世人榮樂壽苦之數其真君俱戴星冠躡朱履衣絳紗之衣手執青玉簡佩七星寶劔垂金璫珠珮各宜圖形供養以異花珍果淨水名香燈燭清醴虔心瞻敬至心而呪曰群星飛光環拱辰極普天兆民常蒙至德天尊言九地世人若遇災星臨照之處但依受此法無不獲諸福慶若三元設醮建立壇場誦諸神呪廣積吉善為民祈福三官上奏即命真籙延算俱得長生天尊勑諸大仙及九府靈官三元上奏三官隨其善惡速須上奏我令一切成形永不墜諸惡類獲種種福是時應諸大仙稽首上奏願承慈皆永當奉行太上洞真五星祕授經
